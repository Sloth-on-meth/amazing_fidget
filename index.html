<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FidgetLab</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <div class="header-inner">
      <h1 class="logo">FIDGET<span>LAB</span></h1>
      <div class="logo-rule"><span></span></div>
      <p class="tagline">the ultimate browser fidget collection</p>
    </div>
  </header>

  <main class="fidget-grid">

    <!-- 1. TOGGLE -->
    <div class="fidget-card" id="card-toggle">
      <div class="led-strip"></div>
      <div class="card-label">TOGGLE</div>
      <div class="toggle-housing">
        <div class="toggle-track" id="toggleTrack">
          <div class="toggle-groove">
            <div class="groove-line"></div>
            <div class="groove-line"></div>
            <div class="groove-line"></div>
          </div>
          <div class="toggle-thumb" id="toggleThumb">
            <div class="thumb-face">
              <div class="thumb-ridge"></div>
              <div class="thumb-ridge"></div>
              <div class="thumb-ridge"></div>
              <div class="thumb-dot"></div>
            </div>
          </div>
          <div class="toggle-label off-label">OFF</div>
          <div class="toggle-label on-label">ON</div>
        </div>
        <div class="toggle-shadow"></div>
      </div>
      <div class="click-count" id="clickCount">clicks: 0</div>
    </div>

    <!-- 2. CLICKER -->
    <div class="fidget-card" id="card-clicker">
      <div class="card-label">CLICKER</div>
      <div class="clicker-wrap">
        <div class="clicker-btn" id="clickerBtn">
          <div class="clicker-rim">
            <div class="clicker-face">
              <div class="clicker-ridge"></div>
              <div class="clicker-ridge"></div>
              <div class="clicker-ridge"></div>
            </div>
          </div>
        </div>
        <div class="clicker-shadow"></div>
      </div>
      <div class="clicker-readout">
        <div class="readout-screen">
          <span class="count-digit" id="countDigit">0</span>
        </div>
      </div>
    </div>

    <!-- 3. SQUEEZE BALL -->
    <div class="fidget-card" id="card-squeeze">
      <div class="card-label">SQUEEZE</div>
      <div class="squeeze-scene">
        <div class="squeeze-wrap">
          <div class="squeeze-ball" id="squeezeBall">
            <div class="squeeze-shine-1"></div>
            <div class="squeeze-shine-2"></div>
          </div>
        </div>
        <div class="squeeze-shadow" id="squeezeShadow"></div>
      </div>
      <div class="squeeze-hint">press and hold</div>
    </div>

    <!-- 4. DIAL -->
    <div class="fidget-card" id="card-dial">
      <div class="card-label">DIAL</div>
      <div class="dial-housing">
        <div class="dial-ring"></div>
        <div class="dial-marks">
          <!-- 270° arc: from 225° to 135° clockwise (gap at bottom) -->
          <div class="dial-mark dm-minor" style="--a:225deg"></div>
          <div class="dial-mark dm-minor" style="--a:255deg"></div>
          <div class="dial-mark dm-major" style="--a:270deg"></div>
          <div class="dial-mark dm-minor" style="--a:285deg"></div>
          <div class="dial-mark dm-minor" style="--a:315deg"></div>
          <div class="dial-mark dm-major" style="--a:0deg"></div>
          <div class="dial-mark dm-minor" style="--a:45deg"></div>
          <div class="dial-mark dm-minor" style="--a:75deg"></div>
          <div class="dial-mark dm-major" style="--a:90deg"></div>
          <div class="dial-mark dm-minor" style="--a:105deg"></div>
          <div class="dial-mark dm-minor" style="--a:135deg"></div>
        </div>
        <div class="dial-knob" id="dialKnob">
          <div class="dial-face">
            <div class="dial-indicator"></div>
          </div>
        </div>
      </div>
      <div class="dial-value" id="dialValue">0°</div>
    </div>

    <!-- 5. SLIDER -->
    <div class="fidget-card" id="card-slider">
      <div class="card-label">FADER</div>
      <div class="slider-housing">
        <div class="slider-track-wrap">
          <div class="slider-track" id="sliderTrack">
            <div class="slider-fill" id="sliderFill"></div>
            <div class="slider-notches">
              <div class="slider-notch"></div>
              <div class="slider-notch"></div>
              <div class="slider-notch"></div>
              <div class="slider-notch"></div>
              <div class="slider-notch"></div>
              <div class="slider-notch"></div>
              <div class="slider-notch"></div>
              <div class="slider-notch"></div>
              <div class="slider-notch"></div>
              <div class="slider-notch"></div>
              <div class="slider-notch"></div>
            </div>
            <div class="slider-thumb" id="sliderThumb">
              <div class="fader-cap">
                <div class="fader-line"></div>
                <div class="fader-line"></div>
                <div class="fader-mark"></div>
                <div class="fader-line"></div>
                <div class="fader-line"></div>
              </div>
            </div>
          </div>
        </div>
        <div class="slider-labels">
          <span>0</span><span>50</span><span>100</span>
        </div>
      </div>
      <div class="slider-value" id="sliderValue">50</div>
    </div>

  </main>
  <script src="fidget.js"></script>
</body>
</html>
